<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <script src="https://kit.fontawesome.com/4c2b00dcda.js" crossorigin="anonymous"></script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Cactus+Classical+Serif&family=Crimson+Text:wght@400;700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Cactus+Classical+Serif&family=Crimson+Text:wght@400;700&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
    <script src="browse.js" defer></script>
</head>
<body>
  <div class="skins" id="app">
    <div class="skins-content">

        <!-- HEADER/NAV-->


      <header class="nav__bar">
        <div class="nav__bar--content">
          <img src="assets/SQLogoFinal.png" class="logo" alt="">
          <div class="nav__links">
            <div class="link">  
              <a href="index.html" class="link--anchor">Home</a>
            </div>
            <div class="link">  
              <a href="browse.html" class="link--anchor">Browse</a>
            </div>
            <div class="link link--aux">
              <a href="#" class="link--anchor">Contact</a>
            </div>
            <div class="toggle-contrast" onclick="toggleDarkTheme()">
              <i class="fa-solid fa-sun red"></i>
            </div>
          </div>
        </div>
      </header>

      <!-- LANDING PAGE -->


      <section class="landingpage" id="landing-page">
          <div class="main-content">
            <div class="main-content--text">
              <h1>
                Browse by <span class="red">category</span>
              </h1>
            </div>
            <div class="category-filters">
              <label class="filter-label">
                <input type="checkbox" value="Knives" class="category-checkbox">
                <span>Knives</span>
              </label>
              <label class="filter-label">
                <input type="checkbox" value="Gloves" class="category-checkbox">
                <span>Gloves</span>
              </label>
              <label class="filter-label">
                <input type="checkbox" value="SMGs" class="category-checkbox">
                <span>SMGs</span>
              </label>
              <label class="filter-label">
                <input type="checkbox" value="Rifles" class="category-checkbox">
                <span>Assault Rifles</span>
              </label>
              <label class="filter-label">
                <input type="checkbox" value="Heavy" class="category-checkbox">
                <span>Heavy</span>
              </label>
              <label class="filter-label">
                <input type="checkbox" value="Rifles" class="category-checkbox" data-display="AWP">
                <span>AWP</span>
              </label>
              <label class="filter-label">
                <input type="checkbox" value="Pistols" class="category-checkbox">
                <span>Pistols</span>
              </label>
            </div>
            <div class="rarity-filters">
              <label class="filter-label">
                <input type="checkbox" value="Covert" class="rarity-checkbox">
                <span>Covert</span>
              </label>
              <label class="filter-label">
                <input type="checkbox" value="Classified" class="rarity-checkbox">
                <span>Classified</span>
              </label>
              <label class="filter-label">
                <input type="checkbox" value="Restricted" class="rarity-checkbox">
                <span>Restricted</span>
              </label>
              <label class="filter-label">
                <input type="checkbox" value="Mil-Spec Grade" class="rarity-checkbox">
                <span>Mil-Spec Grade</span>
              </label>
              <label class="filter-label">
                <input type="checkbox" value="Industrial Grade" class="rarity-checkbox">
                <span>Industrial Grade</span>
              </label>
              <label class="filter-label">
                <input type="checkbox" value="Consumer Grade" class="rarity-checkbox">
                <span>Consumer Grade</span>
              </label>
            </div>
            <div class="search-wrapper">
            <input type="text" class="content-searchbar" placeholder="Asiimov...">
            <button class="search-btn">
              <i class="fa-solid fa-crosshairs"></i>
            </button>
            </div>
            <div class="loading" style="display: none;">
              <i class="fa-solid fa-spinner fa-spin"></i>
            </div>
            <div class="search-results"></div>
            <div class="skin-modal">
              <div class="modal-content"></div>
            </div>
            <div class="itemData">
              <img src="#" alt="" class="itemData--img">
              <div class="itemDataText">
                <h4 class="itemData--name"></h4>
                <h4 class="itemData--rarity"></h4>
                <h4 class="itemData--description"></h4>
              </div>
            </div>
          </div>
        </section>
    </div>
  </div>
    
</body>
</html>
